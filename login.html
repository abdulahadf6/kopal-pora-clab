<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
overflow:hidden;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
text-align:center;
color:white;
animation:fadeIn 1s ease;
}

.logo{
width:120px;
margin-bottom:15px;
animation:float 4s ease-in-out infinite;
}

h1{
font-size:28px;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#38bdf8;
color:#fff;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

.back{
margin-top:15px;
display:inline-block;
color:#fff;
text-decoration:none;
opacity:.8;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<img src="Logo.png" class="logo">

<h1>Member Login</h1>

<p>Enter your Member ID</p>

<input type="text" placeholder="AX001">

<button>Sign In</button>

<a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
