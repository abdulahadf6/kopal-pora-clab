
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-200px;
left:-200px;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-150px;
right:-150px;
}

.card{
width:90%;
max-width:430px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
padding:35px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.35);
text-align:center;
color:white;
z-index:1;
animation:fadeUp 1s ease;
}

.logo{
width:130px;
margin-bottom:15px;
animation:float 4s ease-in-out infinite;
}

.club{
font-size:14px;
opacity:.8;
margin-bottom:10px;
}

h1{
font-size:30px;
margin-bottom:10px;
}

.subtitle{
opacity:.8;
margin-bottom:25px;
}

.input-box{
position:relative;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#38bdf8;
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(56,189,248,.4);
}

.back{
display:inline-block;
margin-top:20px;
color:white;
text-decoration:none;
opacity:.8;
}

.back:hover{
opacity:1;
}

.footer{
margin-top:25px;
font-size:12px;
opacity:.7;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="card">

<img src="Logo.png" class="logo" alt="Logo">

<div class="club">
কপাল পোড়া ট্রাভেলার্স ক্লাব
</div>

<h1>Member Login</h1>

<div class="subtitle">
Enter your Member ID
</div>

<div class="input-box">
<input type="text" placeholder="AX001">
</div>

<button>
🔐 Sign In
</button>

<a href="index.html" class="back">
← Back to Home
</a>

<div class="footer">
Kopal Pora Travelers Club © 2026
</div>

</div>

</body>
</html>
