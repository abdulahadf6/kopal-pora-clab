<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কপাল পোড়া ট্রাভেলার্স ক্লাব</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fa;
    text-align:center;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.logo{
    margin-top:30px;
}

.logo img{
    width:300px;
    max-width:80%;
}

h1{
    font-size:48px;
    margin:20px 0 10px;
}

.slogan{
    font-size:22px;
    color:#666;
}

.signin{
    margin-top:40px;
}

.signin button{
    background:#2563eb;
    color:white;
    font-size:18px;
    padding:15px 35px;
}

.menu{
    position:fixed;
    top:0;
    right:-250px;
    width:250px;
    height:100%;
    background:white;
    box-shadow:-3px 0 10px rgba(0,0,0,.2);
    transition:0.3s;
    padding-top:60px;
}

.menu.show{
    right:0;
}

.menu a{
    display:block;
    padding:15px;
    text-decoration:none;
    color:black;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="topbar">
    <div>
        <button>🌙 Theme</button>
        <button>🌐 EN</button>
    </div>

    <button onclick="toggleMenu()">☰</button>
</div>

<div class="logo">
    <img src="logo.png" alt="Logo">
</div>

<h1>কপাল পোড়া ট্রাভেলার্স ক্লাব</h1>

<div class="slogan">
    ঘুরতে যান এবং গোয়া মারা খান
</div>

<div class="signin">
    <button>🔐 Sign In</button>
</div>

<div class="menu" id="menu">
    <a href="#">🏠 Dashboard</a>
    <a href="#">👥 Members</a>
    <a href="#">💰 Income History</a>
    <a href="#">💸 Expense History</a>
    <a href="#">📊 Reports</a>
    <a href="#">🧳 Tour Archive</a>
    <a href="#">📖 About & Rules</a>
</div>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
