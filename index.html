<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কপাল পোড়া ট্রাভেলার্স ক্লাব</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

:root{
--bg:#f4f7fb;
--card:#ffffff;
--text:#111827;
--secondary:#475569;
--primary:#0f172a;
}

.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
--secondary:#cbd5e1;
--primary:#38bdf8;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
min-height:100vh;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.left-tools,
.right-tools{
display:flex;
gap:10px;
}

.btn{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
background:var(--card);
color:var(--text);
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.hero{
text-align:center;
padding:30px 20px;
}

.hero img{
width:220px;
max-width:80%;
}

.club-name{
font-size:clamp(32px,5vw,60px);
font-weight:700;
margin-top:15px;
}

.slogan{
margin-top:10px;
font-size:18px;
color:var(--secondary);
}

.signin{
margin-top:35px;
}

.signin button{
background:#2563eb;
color:white;
border:none;
padding:15px 35px;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.drawer{
position:fixed;
top:0;
right:-280px;
width:280px;
height:100%;
background:var(--card);
padding:25px;
transition:.3s;
box-shadow:-3px 0 15px rgba(0,0,0,.2);
}

.drawer.open{
right:0;
}

.drawer h2{
margin-bottom:20px;
}

.drawer a{
display:block;
padding:12px 0;
text-decoration:none;
color:var(--text);
font-weight:600;
border-bottom:1px solid rgba(120,120,120,.15);
}

.footer{
text-align:center;
margin-top:80px;
padding:20px;
color:var(--secondary);
}

</style>
</head>

<body>

<div class="topbar">

<div class="left-tools">

<button class="btn" onclick="toggleTheme()">
🌙 Theme
</button>

<button class="btn" onclick="toggleLang()">
🌐 EN
</button>

</div>

<div class="right-tools">

<button class="btn" onclick="toggleMenu()">
☰
</button>

</div>

</div>
