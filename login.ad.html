<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - KPTC</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
/* 🟢 অ্যাডমিন প্যানেলের জন্য প্রিমিয়াম ডার্ক গ্রিন গ্লোয়িং ব্যাকগ্রাউন্ড */
background:linear-gradient(135deg,#030611,#064e3b,#10b981);
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.05);
border-radius:50%;
top:-200px;
left:-200px;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,.03);
border-radius:50%;
bottom:-150px;
right:-150px;
}

.card{
width:90%;
max-width:430px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
padding:35px;
border-radius:30px;
border: 1px solid rgba(255, 255, 255, 0.1);
box-shadow:0 20px 50px rgba(0,0,0,.5);
text-align:center;
color:white;
z-index:1;
animation:fadeUp 1s ease;
}

.logo{
width:130px;
margin-bottom:15px;
filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.4));
animation:float 4s ease-in-out infinite;
}

.club{
font-size:14px;
opacity:.8;
margin-bottom:5px;
}

.badge {
  display: inline-block;
  margin-bottom: 15px;
  padding: 4px 12px;
  background: rgba(16, 185, 129, 0.2);
  border: 1px solid #10b981;
  color: #10b981;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
}

h1{
font-size:30px;
margin-bottom:10px;
}

.subtitle{
opacity:.8;
margin-bottom:25px;
}

.input-box{
position:relative;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
font-size:16px;
color: #000;
text-align: center;
font-weight: 600;
margin-bottom: 12px; /* দুটি ইনপুটের মাঝে স্পেস */
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#10b981; /* 🟢 অ্যাডমিন সিগনেচার বাটন */
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(16, 185, 129, .5);
}

.back{
display:inline-block;
margin-top:20px;
color:white;
text-decoration:none;
opacity:.8;
}

.back:hover{
opacity:1;
}

.footer{
margin-top:25px;
font-size:12px;
opacity:.7;
}

.error-text {
color: #f87171;
font-size: 14px;
margin-bottom: 15px;
display: none;
font-weight: 500;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="card">

<img src="Logo.png" class="logo" alt="Logo">

<div class="club">কপাল পোড়া ট্রাভেলার্স ক্লাব</div>
<div class="badge">ADMIN PANEL</div>

<h1>Admin Login</h1>

<div class="subtitle">Firebase Console Authentication</div>

<div class="input-box">
  <input type="email" id="adminEmailInput" placeholder="axxxxxxx@kptc.com">
  <input type="password" id="adminPasswordInput" placeholder="xxxxxxxxx">
</div>

<div class="error-text" id="errorBlock">ভুল ইমেইল বা পাসওয়ার্ড!</div>

<button onclick="validateAdmin()">
 Sign In as Admin
</button>

<a href="index.ad.html" class="back">
← Back to Main Home
</a>

<div class="footer">
Kopal Pora Travelers Club © 2026
</div>

</div>

<script>
// আপনার ফায়ারবেজ ডাটাবেজ এবং অ্যাপ কনফিগারেশন লিংক
const firebaseConfig = {
  databaseURL: "https://kopal-pora-travelers-club-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

// ফায়ারবেজ ইনিশিয়ালাইজ করা
firebase.initializeApp(firebaseConfig);

function validateAdmin() {
  const email = document.getElementById('adminEmailInput').value.trim();
  const password = document.getElementById('adminPasswordInput').value;
  const errorBlock = document.getElementById('errorBlock');
  
  errorBlock.style.display = "none";

  if(!email || !password) {
    errorBlock.innerText = "দয়া করে ইমেইল এবং পাসওয়ার্ড দুটিই লিখুন!";
    errorBlock.style.display = "block";
    return;
  }

  // 🔒 ফায়ারবেজ অথেন্টিকেশন (Firebase Auth Console) মেকানিজম
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then((userCredential) => {
      // লগইন সফল হলে সেশনে 'admin' রোল সেট হবে 
      sessionStorage.setItem('userRole', 'admin');
      
      // সফল লগইনের পর সরাসরি dashboard.ad.html-এ নিয়ে যাবে
      window.location.href = "dashboard.ad.html"; 
    })
    .catch((error) => {
      // পাসওয়ার্ড ভুল হলে বা কোনো সমস্যা থাকলে এরর মেসেজ দেখাবে
      console.error(error);
      errorBlock.innerText = "ভুল ইমেইল অথবা পাসওয়ার্ড! আবার চেষ্টা করুন।";
      errorBlock.style.display = "block";
    });
}
</script>

</body>
</html>
