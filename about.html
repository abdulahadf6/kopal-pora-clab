<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPTC - About, Policies & Tech</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  transition:.4s;
}

body{
  background:#020617;
  color:white;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* Animated Background */
.bg{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
  background:#020617;
}

.bg::before{
  content:"";
  position:absolute;
  width:1400px;
  height:1400px;
  left:-300px;
  top:-300px;
  background: radial-gradient(circle, rgba(16,185,129,.35), transparent 60%);
  animation:move1 18s linear infinite;
  filter:blur(80px);
}

.bg::after{
  content:"";
  position:absolute;
  width:1200px;
  height:1200px;
  right:-250px;
  bottom:-250px;
  background: radial-gradient(circle, rgba(6,182,212,.35), transparent 60%);
  animation:move2 15s linear infinite;
  filter:blur(80px);
}

@keyframes move1{
  0%{ transform:rotate(0deg); }
  100%{ transform:rotate(360deg); }
}
@keyframes move2{
  0%{ transform:rotate(360deg); }
  100%{ transform:rotate(0deg); }
}

/* Menu */
.menu-btn{
  position:fixed;
  top:20px;
  left:20px;
  z-index:1002;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);
  padding:12px 18px;
  border-radius:15px;
  cursor:pointer;
  font-size:24px;
}
.menu-btn:hover{ transform:scale(1.05); }

/* Sidebar */
.sidebar{
  position:fixed;
  left:-320px;
  top:0;
  width:300px;
  height:100%;
  padding:25px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(30px);
  border-right:1px solid rgba(255,255,255,.1);
  z-index:1001;
}
.sidebar.show{ transform:translateX(320px); }

.close-btn { 
  font-size: 26px; 
  cursor: pointer; 
  margin-bottom: 25px; 
  color: #94a3b8; 
  display: inline-block;
}
.close-btn:hover { 
  color: #fff; 
  transform: rotate(90deg); 
}

.sidebar a{
  display:block;
  text-decoration:none;
  color:white;
  padding:14px;
  margin-bottom:10px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
}
.sidebar a:hover{ transform:translateX(6px); }

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
  opacity:0;
  visibility:hidden;
  z-index:1000;
}
.overlay.show{ opacity:1; visibility:visible; }

/* Main */
.container{
  max-width:1200px;
  margin:auto;
  padding:90px 20px 40px;
}
.page-title{
  text-align:center;
  font-size:42px;
  margin-bottom:35px;
  font-weight:700;
}

/* Panel */
.panel{
  margin-top:25px;
  padding:35px;
  border-radius:28px;
  background: rgba(255,255,255,.04);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,.12);
  position: relative;
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  padding-bottom: 15px;
}
.panel h2{ margin-bottom: 0; font-size: 24px; color: #10b981; }

/* অ্যাডভান্সড অ্যানিমেটেড ল্যাঙ্গুয়েজ বাটন */
.translate-btn {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: #94a3b8;
  width: 120px;
  height: 38px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  position: relative;
  overflow: hidden;
}
.translate-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.3);
  color: #fff;
}

/* বাটন কন্টেইনার ফ্রেম */
.btn-inner {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  padding: 0 12px;
  justify-content: space-between;
}

/* ইমোজি স্টাইল ও অ্যানিমেশন */
.btn-emoji {
  font-size: 14px;
  position: absolute;
  left: 12px;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 2;
}

/* টেক্সট র‍্যাপার এবং স্লাইডিং অ্যানিমেশন */
.btn-text {
  position: absolute;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}
.text-en {
  right: 14px;
  opacity: 1;
  transform: translateY(0);
}
.text-bn {
  left: 14px;
  opacity: 0;
  transform: translateY(20px); /* নিচে লুকিয়ে থাকবে */
}

/* --- অ্যাক্টিভ বাংলা মোড স্টেট --- */
.translate-btn.active-bn {
  background: rgba(16, 185, 129, 0.12);
  border-color: #10b981;
  color: #10b981;
  box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
}
/* ইমোজি বাম থেকে ডান পাশে যাবে (১২ পিক্সেল থেকে সরিয়ে ডানে নেওয়া) */
.translate-btn.active-bn .btn-emoji {
  transform: translateX(82px);
}
/* ইংরেজি টেক্সট নিচে নেমে অদৃশ্য হবে */
.translate-btn.active-bn .text-en {
  opacity: 0;
  transform: translateY(20px);
}
/* বাংলা টেক্সট নিচ থেকে উঠে সামনে আসবে */
.translate-btn.active-bn .text-bn {
  opacity: 1;
  transform: translateY(0);
}

.panel p { line-height: 1.8; color: #cbd5e1; font-size: 16px; text-align: justify; margin-bottom: 15px; }
.panel ul { padding-left: 20px; color: #cbd5e1; line-height: 2; font-size: 16px; }
.panel ul li { margin-bottom: 12px; text-align: justify; }

.footer{ text-align:center; padding:40px; color:#94a3b8; }
</style>
</head>

  const lang = currentLang[section];
  const btn = document.getElementById(section + 'Btn');
  
  // টেক্সট ও টাইটেল আপডেট
  if (section === 'about') {
    document.getElementById('aboutTitle').innerHTML = contents.about[lang].title;
    document.getElementById('aboutContent').innerHTML = contents.about[lang].html;
  } else if (section === 'policy') {
    document.getElementById('policyTitle').innerHTML = contents.policy[lang].title;
    document.getElementById('policyContent').innerHTML = contents.policy[lang].html;
  } else if (section === 'clubWeb') {
    document.getElementById('clubWebTitle').innerHTML = contents.clubWeb[lang].title;
    document.getElementById('clubWebContent').innerHTML = contents.clubWeb[lang].html;
  }

  // বাটন অ্যানিমেশন ক্লাস টগল
  if (lang === 'bn') {
    btn.classList.add('active-bn');
  } else {
    btn.classList.remove('active-bn');
  }
}

initContent();

function openMenu(){
  document.getElementById('sidebar').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('menuBtn').style.opacity='0';
}
function closeMenu(){
  document.getElementById('sidebar').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('menuBtn').style.opacity='1';
}
</script>

</body>
</html>
