<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPTC - Ultimate Admin Control</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; transition: all 0.3s ease; }
  body{ background:#081018; color:#fff; padding:40px 20px; display:flex; flex-direction:column; align-items:center; min-height:100vh; background: linear-gradient(135deg, #051923, #0b132b); }
  .admin-container{ width:100%; max-width:700px; }
  h2{ text-align:center; margin-bottom:30px; font-size:32px; background: linear-gradient(135deg, #22d3ee, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  /* Tabs System */
  .tabs{ display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
  .tab-btn{ flex: 1; min-width: 120px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px; text-align: center; }
  .tab-btn.active{ background: linear-gradient(135deg, #22d3ee, #10b981); color: white; border: none; box-shadow: 0 5px 15px rgba(34,211,238,0.2); }
  
  .glass-box{ background:rgba(255,255,255,.04); backdrop-filter:blur(40px); border:1px solid rgba(255,255,255,.08); border-radius:24px; padding:30px; box-shadow:0 15px 35px rgba(0,0,0,.4); display: none; }
  .glass-box.active{ display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0; transform: translateY(10px);} to{opacity:1; transform: translateY(0);} }
  
  h3{ color:#22d3ee; margin-bottom:20px; font-size:20px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:8px; display: flex; align-items: center; gap: 8px; }
  .form-group{ margin-bottom:18px; display:flex; flex-direction:column; gap:8px; }
  label{ font-size:14px; color:#94a3b8; font-weight: 500; }
  input, select, textarea{ padding:14px; border:none; outline:none; background:rgba(255,255,255,.07); color:white; border-radius:12px; font-size:16px; width: 100%; }
  textarea{ resize: vertical; min-height: 80px; }
  select option{ background:#0b132b; color:#fff; }
  
  .btn{ padding:16px; border:none; background:linear-gradient(135deg, #22d3ee, #10b981); color:white; border-radius:12px; font-weight:bold; cursor:pointer; font-size:16px; margin-top:10px; width:100%; }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 5px 15px rgba(34,211,238,0.3); }
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="admin-container">
  <h2>🔐 KPTC Central Control Panel</h2>
  
  <div class="tabs">
    <div class="tab-btn active" onclick="switchTab('collection-sec', this)">📅 Collection</div>
    <div class="tab-btn" onclick="switchTab('member-sec', this)">👥 Add Member</div>
    <div class="tab-btn" onclick="switchTab('income-sec', this)">💰 Add Income</div>
    <div class="tab-btn" onclick="switchTab('expense-sec', this)">💸 Add Expense</div>
  </div>

  <div id="collection-sec" class="glass-box active">
    <h3>📅 Update Member Monthly Collection</h3>
    <form id="collectionForm">
      <div class="form-group"><label>Member ID</label><input type="text" id="colId" placeholder="e.g., m001" required></div>
      <div class="form-group"><label>Member Name</label><input type="text" id="colName" placeholder="Full Name" required></div>
      <div class="form-group">
        <label>Year</label>
        <select id="colYear"><option value="2026">2026</option><option value="2027">2027</option><option value="2028">2028</option></select>
      </div>
      <div class="form-group">
        <label>Month</label>
        <select id="colMonth">
          <option value="Jan">January</option><option value="Feb">February</option><option value="Mar">March</option><option value="Apr">April</option>
          <option value="May">May</option><option value="Jun">June</option><option value="Jul">July</option><option value="Aug">August</option>
          <option value="Sep">September</option><option value="Oct">October</option><option value="Nov">November</option><option value="Dec">December</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="colStatus"><option value="true">Paid (✅)</option><option value="false">Unpaid (❌)</option></select>
      </div>
      <button type="submit" class="btn">Save Collection Status</button>
    </form>
  </div>

  <div id="member-sec" class="glass-box">
    <h3>👥 Register New Member</h3>
    <form id="memberForm">
      <div class="form-group"><label>Assign Member ID</label><input type="text" id="mId" placeholder="e.g., m001" required></div>
      <div class="form-group"><label>Full Name</label><input type="text" id="mName" placeholder="Enter full name" required></div>
      <div class="form-group"><label>Location/Address</label><input type="text" id="mLoc" placeholder="e.g., Khulna, Dhaka" required></div>
      <div class="form-group">
        <label>Status</label>
        <select id="mStatus"><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
      </div>
      <button type="submit" class="btn">Register Member</button>
    </form>
  </div>

  <div id="income-sec" class="glass-box">
    <h3>💰 Record Extra Income (Except Monthly Collection)</h3>
    <form id="incomeForm">
      <div class="form-group"><label>Source / Reason</label><input type="text" id="incSource" placeholder="e.g., Sponsor, Bank Interest" required></div>
      <div class="form-group"><label>Received From</label><input type="text" id="incFrom" placeholder="e.g., Abir Hasan, XYZ Group" required></div>
      <div class="form-group"><label>Amount (৳)</label><input type="number" id="incAmount" placeholder="Amount in BDT" required></div>
      <div class="form-group"><label>Date</label><input type="date" id="incDate" required></div>
      <button type="submit" class="btn">Add Income Entry</button>
    </form>
  </div>

  <div id="expense-sec" class="glass-box">
    <h3>💸 Record Tour & Club Expenses</h3>
    <form id="expenseForm">
      <div class="form-group"><label>Main Category / Tour Name</label><input type="text" id="expCat" placeholder="e.g., Mongla Tour, Picnic 2026" required></div>
      <div class="form-group"><label>Total Amount Spent (৳)</label><input type="number" id="expAmount" placeholder="Total Category Expense" required></div>
      <div class="form-group"><label>Date</label><input type="date" id="expDate" required></div>
      
      <div class="form-group">
        <label>Detailed Breakdown (Tour Expense Details)</label>
        <textarea id="expDetails" placeholder="e.g., Bus fare: 5000, Food: 4000, Resort: 8000" required></textarea>
      </div>
      <button type="submit" class="btn">Add Expense Entry</button>
    </form>
  </div>

</div>

<script>
  // ফায়ারবেজ ইনিশিয়ালাইজ
  const firebaseConfig = {
    databaseURL: "https://kopal-pora-travelers-club-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // আজকের ডেট ডিফল্ট সেট করার ফাংশন
  document.getElementById('incDate').valueToDate = new Date();
  document.getElementById('expDate').valueToDate = new Date();

  // ট্যাব পরিবর্তন লজিক
  function switchTab(sectionId, btn) {
    document.querySelectorAll('.glass-box').forEach(box => box.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(tBtn => tBtn.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    btn.classList.add('active');
  }

  // ১. কালেকশন সাবমিট
  document.getElementById('collectionForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('colId').value.trim();
    const name = document.getElementById('colName').value.trim();
    const year = document.getElementById('colYear').value;
    const month = document.getElementById('colMonth').value;
    const status = document.getElementById('colStatus').value === "true";

    db.ref('collections/' + year + '/' + id).update({
      name: name,
      [month]: status
    }).then(() => { alert("Collection updated successfully!"); })
      .catch(err => alert("Error: " + err.message));
  });

  // ২. নতুন মেম্বার সাবমিট
  document.getElementById('memberForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('mId').value.trim();
    const name = document.getElementById('mName').value.trim();
    const loc = document.getElementById('mLoc').value.trim();
    const status = document.getElementById('mStatus').value;

    db.ref('members/' + id).set({
      id: id,
      name: name,
      location: loc,
      status: status
    }).then(() => { alert("Member registered successfully!"); document.getElementById('memberForm').reset(); })
      .catch(err => alert("Error: " + err.message));
  });

  // ৩. ইনকাম সাবমিট
  document.getElementById('incomeForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const source = document.getElementById('incSource').value.trim();
    const from = document.getElementById('incFrom').value.trim();
    const amount = Number(document.getElementById('incAmount').value);
    const date = document.getElementById('incDate').value;

    // নতুন ইনকাম আইডি অটো জেনারেট হবে push() এর মাধ্যমে
    db.ref('income/history').push({
      source: source,
      from: from,
      amount: amount,
      date: date
    }).then(() => { alert("Income recorded successfully!"); document.getElementById('incomeForm').reset(); })
      .catch(err => alert("Error: " + err.message));
  });

  // ৪. খরচ সাবমিট
  document.getElementById('expenseForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const category = document.getElementById('expCat').value.trim();
    const amount = Number(document.getElementById('expAmount').value);
    const date = document.getElementById('expDate').value;
    const details = document.getElementById('expDetails').value.trim();

    // হিস্ট্রিতে মেইন ক্যাটাগরি পুশ হবে
    const newExpRef = db.ref('expense/history').push();
    newExpRef.set({
      category: category,
      amount: amount,
      date: date
    }).then(() => {
      // ট্যুরের ভেতরের খতিয়ান (Tour Expense Details) আলাদা নোডে সেভ হবে ওই একই আইডিতে
      return db.ref('expense/details/' + newExpRef.key).set({
        date: date,
        details: details,
        amount: amount
      });
    }).then(() => { 
      alert("Expense and Details recorded successfully!"); 
      document.getElementById('expenseForm').reset(); 
    }).catch(err => alert("Error: " + err.message));
  });
</script>
</body>
</html>
