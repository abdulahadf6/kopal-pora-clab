<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPTC - Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#081018;
color:#fff;
min-height:100vh;
padding: 40px 20px;
display: flex;
justify-content: center;
align-items: center;
background: linear-gradient(135deg, #051923, #0b132b);
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(40px);
border:1px solid rgba(255,255,255,.1);
border-radius:24px;
box-shadow: 0 15px 35px rgba(0,0,0,.3);
width: 100%;
max-width: 600px;
padding: 40px;
}

h2 {
margin-bottom: 30px;
font-size: 28px;
font-weight: 700;
text-align: center;
background: linear-gradient(135deg, #22d3ee, #10b981);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.form-group {
margin-bottom: 20px;
display: flex;
flex-direction: column;
gap: 8px;
}

label {
font-size: 14px;
color: #94a3b8;
}

select, input{
padding:16px;
border:none;
outline:none;
background:rgba(255,255,255,.07);
color:white;
border-radius:14px;
font-size: 16px;
width: 100%;
}

select option {
background-color: #0b132b;
color: #ffffff;
}

.submit-btn {
margin-top: 15px;
padding: 16px;
border: none;
background: linear-gradient(135deg, #22d3ee, #10b981);
color: white;
border-radius: 14px;
font-weight: bold;
cursor: pointer;
font-size: 16px;
width: 100%;
transition: transform 0.2s, box-shadow 0.2s;
}

.submit-btn:hover {
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(34,211,238,0.4);
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

</head>
<body>

<div class="glass">
<h2>🔐 KPTC Admin Dashboard</h2>
<form id="adminForm">
  
  <div class="form-group">
    <label for="memberId">Member ID</label>
    <input type="text" id="memberId" placeholder="e.g., m001" required>
  </div>

  <div class="form-group">
    <label for="memberName">Member Name</label>
    <input type="text" id="memberName" placeholder="Full Name" required>
  </div>

  <div class="form-group">
    <label for="year">Select Year</label>
    <select id="year">
      <option value="2026">2026</option>
      <option value="2027">2027</option>
      <option value="2028">2028</option>
      <option value="2029">2029</option>
      <option value="2030">2030</option>
    </select>
  </div>

  <div class="form-group">
    <label for="month">Select Month</label>
    <select id="month">
      <option value="Jan">January</option>
      <option value="Feb">February</option>
      <option value="Mar">March</option>
      <option value="Apr">April</option>
      <option value="May">May</option>
      <option value="Jun">June</option>
      <option value="Jul">July</option>
      <option value="Aug">August</option>
      <option value="Sep">September</option>
      <option value="Oct">October</option>
      <option value="Nov">November</option>
      <option value="Dec">December</option>
    </select>
  </div>

  <div class="form-group">
    <label for="status">Collection Status</label>
    <select id="status">
      <option value="true">Paid (✅)</option>
      <option value="false">Unpaid (❌)</option>
    </select>
  </div>

  <button type="submit" class="submit-btn">Update Database</button>
</form>
</div>

<script>
  // ফায়ারবেজ কনফিগারেশন (আপনার ডাটাবেজ ইউআরএল)
  const firebaseConfig = {
    databaseURL: "https://kopal-pora-travelers-club-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  // ফায়ারবেজ ইনিশিয়ালাইজ
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ডাটা সাবমিট হ্যান্ডলার
  document.getElementById('adminForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const id = document.getElementById('memberId').value.trim();
    const name = document.getElementById('memberName').value.trim();
    const year = document.getElementById('year').value;
    const month = document.getElementById('month').value;
    const status = document.getElementById('status').value === "true";

    // ডাটাবেজের পাথ: collections/year/memberId
    const memberRef = db.ref('collections/' + year + '/' + id);

    // ফায়ারবেস আপডেট
    memberRef.update({
      name: name,
      [month]: status
    }).then(() => {
      alert(`Successfully updated for ${name}!`);
      // ফর্ম আংশিক রিসেট (আইডি ও নাম রেখে দেওয়া হলো যেন অন্য মাসের ডাটা দ্রুত দেওয়া যায়)
    }).catch((error) => {
      console.error("Error: ", error);
      alert("Failed to update database.");
    });
  });
</script>

</body>
</html>
